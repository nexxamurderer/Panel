<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Nexxa Official Panel - RESELLER PANEL</title>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&display=swap" rel="stylesheet">
  <style>
    :root {
      --bg: #0a0c16;
      --card-bg: #131722;
      --text: #ffffff;
      --muted: #8fa0dd;
      --primary: #2ecc71;       /* Hijau Neon ala tombol Login */
      --danger: #e74c3c;        /* Merah Coral ala tombol Forgot Password */
      --input-bg: #1b2031;
      --shadow: rgba(0, 0, 0, 0.5);
    }

    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      font-family: 'Inter', sans-serif;
      background: var(--bg);
      color: var(--text);
      display: flex;
      justify-content: center;
      align-items: center;
      min-height: 100vh;
      padding: 20px;
    }

    .dashboard {
      background: var(--card-bg);
      padding: 35px 25px;
      border-radius: 16px;
      box-shadow: 0 8px 32px var(--shadow);
      max-width: 450px;
      width: 100%;
      border: 1px solid rgba(255, 255, 255, 0.05);
      text-align: center;
      animation: fadeIn 0.4s ease;
    }

    /* Avatar atas ala Pterodactyl Theme */
    .panel-avatar {
      width: 120px;
      height: 120px;
      border-radius: 8px;
      object-fit: cover;
      margin-bottom: 20px;
      border: 2px solid rgba(255, 255, 255, 0.1);
    }

    h2 {
      font-size: 22px;
      font-weight: 700;
      margin: 0 0 5px;
      letter-spacing: 0.5px;
    }

    p.sub {
      color: var(--muted);
      font-size: 14px;
      margin: 0 0 25px;
    }

    .info {
      background: rgba(255, 255, 255, 0.02);
      border: 1px solid rgba(255, 255, 255, 0.05);
      border-radius: 12px;
      padding: 15px;
      margin-bottom: 25px;
    }

    .stat {
      display: flex;
      justify-content: space-between;
      align-items: center;
      background: var(--input-bg);
      border-radius: 8px;
      padding: 12px 16px;
      font-size: 14px;
    }

    .stat span {
      color: var(--muted);
    }

    .stat b {
      color: var(--primary);
    }

    label {
      display: block;
      text-align: left;
      margin-bottom: 8px;
      font-size: 13px;
      font-weight: 600;
      text-transform: uppercase;
      letter-spacing: 1px;
      color: var(--muted);
    }

    input, select {
      width: 100%;
      padding: 14px;
      margin-bottom: 20px;
      border: 1px solid rgba(255, 255, 255, 0.1);
      border-radius: 8px;
      font-size: 15px;
      background: var(--input-bg);
      color: var(--text);
      transition: all 0.2s ease;
    }

    input:focus, select:focus {
      outline: none;
      border-color: var(--primary);
      box-shadow: 0 0 8px rgba(46, 204, 113, 0.3);
    }

    input::placeholder {
      color: rgba(255, 255, 255, 0.3);
    }

    /* Merapikan opsi pilihan select */
    select option {
      background: var(--card-bg);
      color: var(--text);
    }

    .btn {
      width: 100%;
      padding: 14px;
      font-size: 15px;
      font-weight: 700;
      border: none;
      border-radius: 8px;
      cursor: pointer;
      text-transform: uppercase;
      letter-spacing: 1px;
      transition: all 0.2s ease;
      margin-bottom: 10px;
    }

    .btn-primary {
      background: var(--primary);
      color: #0a0c16;
    }

    .btn-primary:hover {
      background: #27ae60;
      box-shadow: 0 0 12px rgba(46, 204, 113, 0.4);
    }

    .btn-danger {
      background: var(--danger);
      color: #ffffff;
    }

    .btn-danger:hover {
      background: #c0392b;
      box-shadow: 0 0 12px rgba(231, 76, 60, 0.4);
    }

    .hidden {
      display: none;
    }

    .success-box {
      text-align: left;
      background: rgba(46, 204, 113, 0.05);
      border: 1px solid var(--primary);
      border-radius: 8px;
      padding: 16px;
      font-size: 14px;
      line-height: 1.6;
      margin-bottom: 20px;
    }

    .success-box b {
      color: var(--muted);
    }

    footer {
      text-align: center;
      font-size: 12px;
      color: var(--muted);
      margin-top: 25px;
      letter-spacing: 0.5px;
    }

    /* Loading Overlay VIP Style */
    .loading-overlay {
      position: fixed;
      inset: 0;
      background: rgba(10, 12, 22, 0.85);
      display: flex;
      justify-content: center;
      align-items: center;
      opacity: 0;
      visibility: hidden;
      transition: all 0.3s ease;
      z-index: 9999;
    }

    .loading-overlay.show {
      opacity: 1;
      visibility: visible;
    }

    .loading-box {
      background: var(--card-bg);
      border: 1px solid rgba(255, 255, 255, 0.1);
      padding: 30px 40px;
      border-radius: 12px;
      text-align: center;
      font-size: 16px;
      color: var(--text);
      box-shadow: 0 8px 30px var(--shadow);
      animation: popIn 0.3s ease;
    }

    .spinner {
      width: 44px;
      height: 44px;
      border: 4px solid rgba(255, 255, 255, 0.1);
      border-top-color: var(--primary);
      border-radius: 50%;
      animation: spin 0.8s linear infinite;
      margin: 0 auto 15px;
    }

    @keyframes spin {
      to { transform: rotate(360deg); }
    }
    @keyframes popIn {
      from { transform: scale(0.9); opacity: 0; }
      to { transform: scale(1); opacity: 1; }
    }
    @keyframes fadeIn {
      from { opacity: 0; transform: translateY(10px); }
      to { opacity: 1; transform: translateY(0); }
    }
  </style>
</head>
<body>

<div class="dashboard">
  <img class="panel-avatar" src="https://via.placeholder.com/150" alt="VIP Avatar" onerror="this.style.display='none'">
  
  <h2 id="greeting">RESELLER PANEL MENU</h2>
  <p class="sub" id="clock">WIB: --:--:--</p>

  <div class="info">
    <div class="stat">
      <span>STATUS BATERAI</span> 
      <b id="baterai">Mendeteksi...</b>
    </div>
  </div>

  <div id="step1">
    <label>Username Panel</label>
    <input id="panelUser" placeholder="Masukkan username baru">
    
    <label>Paket RAM</label>
    <select id="panelPaket">
      <option value="">-- PILIH PAKET RAM --</option>
      <option value="1gb">1GB</option>
      <option value="2gb">2GB</option>
      <option value="3gb">3GB</option>
      <option value="4gb">4GB</option>
      <option value="5gb">5GB</option>
      <option value="6gb">6GB</option>
      <option value="7gb">7GB</option>
      <option value="8gb">8GB</option>
      <option value="9gb">9GB</option>
      <option value="10gb">10GB</option>
      <option value="unli">UNLIMITED</option>
    </select>
    
    <button class="btn btn-primary" onclick="buatPanel()">Create Panel</button>
  </div>

  <div id="step2" class="hidden">
    <div class="success-box">
      <b>Email:</b> <span id="email" style="color:#fff;">-</span><br>
      <b>Username:</b> <span id="uname" style="color:#fff;">-</span><br>
      <b>Password:</b> <span id="pass" style="color:#fff;">-</span><br>
      <b>Link:</b> <a href="https://domainpanel.resellergaming.my.id" target="_blank" style="color: var(--primary); font-weight: bold;">Buka Panel</a><br>
      <b>Paket:</b> <span id="ram" style="color: var(--primary); font-weight: bold;">-</span>
    </div>
    <button class="btn btn-primary" onclick="resetForm()">Kembali</button>
    <button class="btn btn-danger" onclick="logout()">Logout</button>
  </div>

  <footer>© 2020 - 2026 NEXXA OFFICIAL</footer>
</div>

<div id="loadingOverlay" class="loading-overlay">
  <div class="loading-box">
    <div class="spinner"></div>
    Memproses Panel VIP...
  </div>
</div>

<script>
/* ---------- JAM WIB ---------- */
function updateClock() {
  const now = new Date().toLocaleTimeString('id-ID', { timeZone: 'Asia/Jakarta' });
  document.getElementById('clock').innerText = `WIB: ${now}`;
}
updateClock();
setInterval(updateClock, 1000);

/* ---------- REALTIME DETEKSI BATERAI HP ---------- */
if ('getBattery' in navigator) {
  navigator.getBattery().then(bat => {
    function updateBatteryStatus() {
      const level = Math.round(bat.level * 100);
      const chargingStatus = bat.charging ? '🔌 Mengisi Daya' : '⚡ Menggunakan Baterai';
      document.getElementById('baterai').innerText = `${level}% (${chargingStatus})`;
    }
    
    // Pemicu awal data dimuat
    updateBatteryStatus();
    
    // Mengawasi perubahan secara realtime saat kabel dicabut/colok atau baterai berkurang
    bat.addEventListener('levelchange', updateBatteryStatus);
    bat.addEventListener('chargingchange', updateBatteryStatus);
  });
} else {
  document.getElementById('baterai').innerText = 'Tidak Didukung';
}

/* ---------- CONFIG & LOGIC API BUAT PANEL ---------- */
const hargaPaket = {
  "1gb": { ram: 1000, disk: 1000, cpu: 40 },
  "2gb": { ram: 2000, disk: 1000, cpu: 60 },
  "3gb": { ram: 3000, disk: 2000, cpu: 80 },
  "4gb": { ram: 4000, disk: 2000, cpu: 100 },
  "5gb": { ram: 5000, disk: 3000, cpu: 120 },
  "6gb": { ram: 6000, disk: 3000, cpu: 140 },
  "7gb": { ram: 7000, disk: 4000, cpu: 160 },
  "8gb": { ram: 8000, disk: 4000, cpu: 180 },
  "9gb": { ram: 9000, disk: 5000, cpu: 200 },
  "10gb": { ram: 10000, disk: 5000, cpu: 220 },
  "unli": { ram: 0, disk: 0, cpu: 0 }
};

async function buatPanel() {
  const user = document.getElementById('panelUser').value.trim();
  const paket = document.getElementById('panelPaket').value;
  const loading = document.getElementById('loadingOverlay');
  if (!user || !paket) return alert('Username dan paket wajib diisi!');

  loading.classList.add('show');

  const cfg = hargaPaket[paket];
  try {
    const res = await fetch(
      `https://api.resellergaming.my.id/pterodactyl/addpanel?domain=https://nexxanewgen.keselekbijiwowo.web.id&plta=ptla_HSOOTrF4l4RKidodh0nKahK4dKCqplIXpRJtimUG3gz&username=${user}&disk=${cfg.disk}&cpu=${cfg.cpu}&ram=${cfg.ram}`
    );
    const data = await res.json();

    if (data?.user?.attributes) {
      const u = data.user.attributes;
      document.getElementById('step1').classList.add('hidden');
      document.getElementById('step2').classList.remove('hidden');
      document.getElementById('email').innerText = u.email;
      document.getElementById('uname').innerText = u.username;
      document.getElementById('pass').innerText = u.password || u.username;
      document.getElementById('ram').innerText = paket.toUpperCase();
      alert('✅ Panel berhasil dibuat!');
    } else {
      alert(`❌ Gagal membuat panel: ${data?.error || 'Unknown error'}`);
    }
  } catch (e) {
    alert('⚠️ Terjadi kesalahan: ' + e.message);
  } finally {
    loading.classList.remove('show');
  }
}

function resetForm() {
  document.getElementById('step2').classList.add('hidden');
  document.getElementById('step1').classList.remove('hidden');
  document.getElementById('panelUser').value = '';
  document.getElementById('panelPaket').value = '';
}

function logout() {
  window.location.href = 'https://google.com';
}
</script>
</body>
</html>
