<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Pterodactyl Login</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Fredoka:wght@500;600;700&family=Inter:wght@400;500;600&display=swap" rel="stylesheet">

  <style>
    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    body {
      display: flex;
      flex-direction: column;
      justify-content: center;
      align-items: center;
      min-height: 100vh;
      background-color: #0b0e22; 
      color: #fff;
      font-family: 'Inter', sans-serif;
      padding: 1rem;
    }

    .login-card {
      background-color: #131931; 
      width: 100%;
      max-width: 420px;
      padding: 2.5rem 2rem;
      border-radius: 24px; 
      text-align: center;
      box-shadow: 0 15px 35px rgba(0, 0, 0, 0.4);
    }

    .logo-placeholder {
      width: 100%;
      height: auto;
      margin-bottom: 1.5rem;
      display: flex;
      justify-content: center;
    }

    .login-title {
      font-family: 'Fredoka', sans-serif;
      font-size: 1.1rem;
      font-weight: 600;
      text-transform: uppercase;
      letter-spacing: 0.05em;
      color: #ffffff;
      text-align: left;
      margin-bottom: 1.5rem;
    }

    .form-group {
      margin-bottom: 1.25rem;
      text-align: left;
    }

    .form-group label {
      display: block;
      font-family: 'Fredoka', sans-serif;
      font-size: 0.95rem;
      font-weight: 600;
      text-transform: uppercase;
      letter-spacing: 0.03em;
      color: #ffffff;
      margin-bottom: 0.5rem;
    }

    input {
      width: 100%;
      padding: 14px 20px;
      background-color: #1a2242; 
      border: none;
      border-radius: 50px; 
      color: #fff;
      font-size: 0.95rem;
      outline: none;
      transition: background-color 0.2s;
    }

    input:focus {
      background-color: #212b54;
    }

    .btn {
      width: 100%;
      padding: 14px;
      border: none;
      border-radius: 50px;
      font-family: 'Fredoka', sans-serif;
      font-weight: 600;
      font-size: 1rem;
      cursor: pointer;
      transition: opacity 0.2s, transform 0.1s;
      color: #ffffff;
      margin-top: 0.5rem;
    }

    .btn:active {
      transform: scale(0.98);
    }

    .btn-login {
      background-color: #2ecc71; 
    }

    .btn-forgot {
      background-color: #ff4757; 
      margin-top: 1rem;
      text-decoration: none;
      display: block;
      text-align: center;
    }

    .btn:hover {
      opacity: 0.9;
    }

    .admin-link-wrapper {
      margin-top: 1.2rem;
      text-align: center;
    }

    .admin-link {
      font-family: 'Fredoka', sans-serif;
      font-size: 0.85rem;
      color: #8b9bb4;
      text-decoration: none;
      transition: color 0.2s;
    }

    .admin-link:hover {
      color: #2ecc71; 
    }

    .loading {
      display: none;
      margin-top: 1rem;
      color: #8b9bb4;
      font-size: 0.9rem;
    }

    #errorBox {
      display: none;
      margin-top: 1rem;
      padding: 12px;
      background: rgba(255, 71, 87, 0.1);
      border-radius: 12px;
      color: #ff4757;
      font-size: 0.9rem;
      text-align: left;
    }

    .footer-text {
      margin-top: 2rem;
      font-family: 'Fredoka', sans-serif;
      font-size: 0.8rem;
      color: #ffffff;
      letter-spacing: 0.03em;
      opacity: 0.8;
    }
  </style>
</head>
<body>

  <div class="login-card">
    <div class="logo-placeholder"></div>

    <div class="login-title">Login to Continue</div>

    <form id="loginForm">
      <div class="form-group">
        <label for="username">Username or Email</label>
        <input type="text" id="username" autocomplete="off" required />
      </div>
      
      <div class="form-group">
        <label for="password">Password</label>
        <input type="password" id="password" required />
      </div>

      <button type="submit" class="btn btn-login">Login</button>
      <a href="#" class="btn btn-forgot">Forgot Password</a>
      
      <div class="admin-link-wrapper">
        <a href="/admin/" class="admin-link">Admin Area</a>
      </div>
      
      <div class="loading">⏳ Memeriksa Credential...</div>
      <div id="errorBox"></div>
    </form>
  </div>

  <div class="footer-text">
    © 2020 - 2026 NEXXA OFFICIAL
  </div>

  <script>
    const form = document.getElementById("loginForm");
    const loading = document.querySelector(".loading");
    const errorBox = document.getElementById("errorBox");

    form.addEventListener("submit", async (e) => {
      e.preventDefault();
      errorBox.style.display = "none";
      loading.style.display = "block";

      const username = document.getElementById("username").value.trim();
      const password = document.getElementById("password").value.trim();

      try {
        const res = await fetch("/api/login", {
          method: "POST",
          headers: { "Content-Type": "application/json" },
          body: JSON.stringify({ username, password }),
        });

        const clone = res.clone();
        let data;
        try {
          data = await res.json();
        } catch {
          const text = await clone.text();
          throw new Error(`Server tidak mengembalikan JSON valid: ${text}`);
        }

        if (res.ok && data.success) {
          localStorage.setItem("username", username);
          window.location.href = "/user/reseller/index.html";
        } else {
          errorBox.textContent = data.message || "Username atau password salah.";
          errorBox.style.display = "block";
        }
      } catch (err) {
        errorBox.textContent = "Terjadi kesalahan: " + err.message;
        errorBox.style.display = "block";
      } finally {
        loading.style.display = "none";
      }
    });
  </script>
</body>
</html>
